basePath: /
definitions:
  echo-backend_internal_models.ApiKey:
    properties:
      created_at:
        example: "2026-01-15T10:30:00Z"
        type: string
      id:
        example: key_a1b2c3d4e5f6
        type: string
      name:
        example: Production API Key
        type: string
      prefix:
        example: sk_a1b2c3d4
        type: string
      scopes:
        example:
        - read
        - write
        - admin
        items:
          type: string
        type: array
      status:
        example: active
        type: string
      user_id:
        example: "1"
        type: string
    type: object
  echo-backend_internal_models.Session:
    properties:
      context_summary:
        example: User is building a REST API for a todo app using Express and Prisma
        type: string
      created_at:
        example: "2026-01-15T10:30:00Z"
        type: string
      id:
        example: sess_abc123
        type: string
      message_count:
        example: 12
        type: integer
      status:
        example: active
        type: string
      title:
        example: Build a REST API with Express
        type: string
      token_count:
        example: 3421
        type: integer
      updated_at:
        example: "2026-01-15T11:45:00Z"
        type: string
      user_id:
        example: 1
        type: integer
    type: object
  echo-backend_internal_models.User:
    properties:
      created_at:
        example: "2026-01-15T10:30:00Z"
        type: string
      email:
        example: jane@example.com
        type: string
      id:
        example: 1
        type: integer
      name:
        example: Jane Doe
        type: string
      role:
        example: user
        type: string
      updated_at:
        example: "2026-01-15T10:30:00Z"
        type: string
    type: object
  echo-backend_internal_models.UserPreferences:
    properties:
      default_features:
        example:
        - web-browsing
        - code-interpreter
        items:
          type: string
        type: array
      default_mode:
        example: agent
        type: string
      default_model:
        example: gpt-4o
        type: string
      default_skills:
        example:
        - python
        - research
        items:
          type: string
        type: array
      user_id:
        example: 1
        type: integer
    type: object
  internal_handler.ChatRequest:
    properties:
      features:
        example:
        - web-browsing
        - code-interpreter
        items:
          type: string
        type: array
      history:
        items:
          $ref: '#/definitions/internal_handler.HistoryMessage'
        type: array
      message:
        example: Explain how the Echo agent works
        type: string
      missionId:
        example: mission_xyz789
        type: string
      mode:
        example: agent
        type: string
      model:
        example: gpt-4o
        type: string
      sessionId:
        example: sess_abc123
        type: string
      skills:
        example:
        - python
        - research
        items:
          type: string
        type: array
    type: object
  internal_handler.CreateSessionRequest:
    properties:
      title:
        example: Build a REST API with Express
        type: string
    type: object
  internal_handler.FeatureResponse:
    properties:
      description:
        example: Browse the web in real-time to fetch up-to-date information
        type: string
      id:
        example: web-browsing
        type: string
      locked:
        example: false
        type: boolean
      name:
        example: Web Browsing
        type: string
    type: object
  internal_handler.HistoryMessage:
    properties:
      content:
        example: What is Echo and how does it work?
        type: string
      role:
        example: user
        type: string
    type: object
  internal_handler.PruneRequest:
    type: object
  internal_handler.UpdateSettingsRequest:
    properties:
      default_features:
        example:
        - web-browsing
        - code-interpreter
        items:
          type: string
        type: array
      default_mode:
        example: agent
        type: string
      default_model:
        example: gpt-4o
        type: string
      default_skills:
        example:
        - python
        - research
        items:
          type: string
        type: array
    type: object
  internal_handler.createAPIKeyRequest:
    properties:
      name:
        example: Production Key
        type: string
      scopes:
        example:
        - read
        - write
        items:
          type: string
        type: array
    type: object
  internal_handler.episodicRecallRequest:
    properties:
      limit:
        example: 50
        type: integer
      offset:
        example: 0
        type: integer
      session_id:
        example: sess_abc123
        type: string
    type: object
  internal_handler.episodicStoreRequest:
    type: object
  internal_handler.loginRequest:
    properties:
      email:
        example: jane@example.com
        type: string
      password:
        example: P@ssw0rd!23
        type: string
    type: object
  internal_handler.proceduralGetRequest:
    properties:
      id:
        example: mem_pr_e5f6g7h8
        type: string
      name:
        example: deploy-to-ecs
        type: string
    type: object
  internal_handler.proceduralStoreRequest:
    properties:
      content:
        example: |-
          1. Build Docker image
          2. Push to ECR
          3. Update ECS service
        type: string
      id:
        example: mem_pr_e5f6g7h8
        type: string
      metadata:
        additionalProperties: true
        type: object
      name:
        example: deploy-to-ecs
        type: string
    type: object
  internal_handler.registerRequest:
    properties:
      email:
        example: jane@example.com
        type: string
      name:
        example: Jane Doe
        type: string
      password:
        example: P@ssw0rd!23
        type: string
    type: object
  internal_handler.semanticSearchRequest:
    properties:
      embedding:
        example:
        - 0.012
        - 0.034
        - -0.056
        items:
          type: number
        type: array
      limit:
        example: 10
        type: integer
      query:
        example: What is Echo agent platform?
        type: string
      threshold:
        example: 0.75
        type: number
    type: object
  internal_handler.semanticStoreRequest:
    properties:
      content:
        example: Echo is an AI agent platform for autonomous task execution
        type: string
      embedding:
        example:
        - 0.012
        - 0.034
        - -0.056
        - 0.078
        items:
          type: number
        type: array
      id:
        example: mem_sm_a1b2c3d4
        type: string
      metadata:
        additionalProperties: true
        type: object
    type: object
host: localhost:8080
info:
  contact:
    email: support@echo.app
    name: Echo API Support
    url: https://echo.app/support
  description: Core API Server for Echo Platform providing Auth, Chat, Sessions, Models,
    Settings, Admin, Memory, and System Services.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: https://echo.app/terms
  title: Echo Backend API
  version: "1.0"
paths:
  /api/v1/admin/api-keys:
    get:
      description: Retrieve all system API keys
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/echo-backend_internal_models.ApiKey'
            type: array
        "500":
          description: Failed to list keys
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List API keys
      tags:
      - Admin
    post:
      consumes:
      - application/json
      description: Generate a new API key with specific scopes
      parameters:
      - description: API Key creation parameters (name, scopes)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.createAPIKeyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Generated full key and record
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request or missing name
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to generate/store key
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create API key
      tags:
      - Admin
  /api/v1/admin/api-keys/{id}:
    delete:
      description: Change an API key status to revoked
      parameters:
      - description: API Key ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Key revoked
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Missing key ID
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Key not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to revoke key
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Revoke API key
      tags:
      - Admin
  /api/v1/admin/stats:
    get:
      description: Count total and active API keys in the system
      produces:
      - application/json
      responses:
        "200":
          description: Total and active key counts
          schema:
            additionalProperties:
              format: int64
              type: integer
            type: object
        "500":
          description: Failed to get stats
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get admin API key statistics
      tags:
      - Admin
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and receive JWT token and session cookie
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: User and Token
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Invalid email or password
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login user
      tags:
      - Auth
  /api/v1/auth/logout:
    post:
      description: Invalidate the session cookie
      produces:
      - application/json
      responses:
        "200":
          description: Logged out
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Logout user
      tags:
      - Auth
  /api/v1/auth/me:
    get:
      description: Fetch profile info for the currently authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/echo-backend_internal_models.User'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: User not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get current user profile
      tags:
      - Auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user account with email, password, and name
      parameters:
      - description: Registration credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.registerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: User and Token
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Email already exists
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register user
      tags:
      - Auth
  /api/v1/chat:
    post:
      consumes:
      - application/json
      description: Stream LLM response packets (SSE) for user message in a session
        or mission
      parameters:
      - description: Chat prompt and session parameters
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.ChatRequest'
      produces:
      - text/event-stream
      responses:
        "200":
          description: 'Server-Sent Events stream (data: JSON)'
          schema:
            type: string
        "400":
          description: Invalid request body or unknown model/skill
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden / Feature tier requirement
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Session not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Send chat message & stream response (SSE)
      tags:
      - Chat
  /api/v1/features:
    get:
      description: Fetch available features and their lock status based on user tier
        header (X-User-Tier)
      produces:
      - application/json
      responses:
        "200":
          description: List of features with lock states
          schema:
            items:
              $ref: '#/definitions/internal_handler.FeatureResponse'
            type: array
        "500":
          description: Failed to retrieve features
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get available features catalog
      tags:
      - Chat
  /api/v1/internal/memory/episodic/recall:
    post:
      consumes:
      - application/json
      description: Retrieve episodic conversation context from Redis
      parameters:
      - description: Episodic recall payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.episodicRecallRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Episodic entries
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Validation error
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Recall episodic memory
      tags:
      - Internal
  /api/v1/internal/memory/episodic/store:
    post:
      consumes:
      - application/json
      description: Save episodic conversation context into Redis
      parameters:
      - description: Episodic store payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.episodicStoreRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Stored status
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Validation error
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Store episodic memory
      tags:
      - Internal
  /api/v1/internal/memory/procedural/get:
    post:
      consumes:
      - application/json
      description: Retrieve procedural workflow steps by ID or name
      parameters:
      - description: Procedural get payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.proceduralGetRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Procedural memory entry
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Validation error
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get procedural memory
      tags:
      - Internal
  /api/v1/internal/memory/procedural/store:
    post:
      consumes:
      - application/json
      description: Record or update procedural workflow steps in PostgreSQL
      parameters:
      - description: Procedural store payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.proceduralStoreRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Recorded status
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Validation error
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Store procedural memory
      tags:
      - Internal
  /api/v1/internal/memory/semantic/search:
    post:
      consumes:
      - application/json
      description: Perform text or vector search over semantic memory in PostgreSQL
      parameters:
      - description: Semantic search payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.semanticSearchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Search results
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Validation error
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Search semantic memory
      tags:
      - Internal
  /api/v1/internal/memory/semantic/store:
    post:
      consumes:
      - application/json
      description: Save or update vector embedding semantic memory in PostgreSQL
      parameters:
      - description: Semantic store payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.semanticStoreRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Indexed status
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Validation error
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Store semantic memory
      tags:
      - Internal
  /api/v1/internal/sessions/{id}/prune:
    post:
      consumes:
      - application/json
      description: Trigger LLM-driven memory consolidation for a session
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      - description: Provider config payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.PruneRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Consolidation status
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Consolidation failed
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Prune and consolidate session
      tags:
      - Internal
  /api/v1/models:
    get:
      description: Fetch aggregated LLM model catalog from configured providers (OpenAI,
        Anthropic, LM Studio, OpenCode Go)
      produces:
      - application/json
      responses:
        "200":
          description: List of available models
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Failed to retrieve models
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get available LLM models
      tags:
      - Models
  /api/v1/sessions:
    get:
      description: Retrieve all active chat sessions belonging to the authenticated
        user
      produces:
      - application/json
      responses:
        "200":
          description: List of sessions
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to list sessions
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List user sessions
      tags:
      - Sessions
    post:
      consumes:
      - application/json
      description: Initialize a new chat session for the current user
      parameters:
      - description: Session title
        in: body
        name: request
        schema:
          $ref: '#/definitions/internal_handler.CreateSessionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/echo-backend_internal_models.Session'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to create session
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a new session
      tags:
      - Sessions
  /api/v1/sessions/{id}:
    delete:
      description: Soft-delete a chat session
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Session soft deleted
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Missing session ID
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: 'Forbidden: ownership mismatch'
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Session not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete session
      tags:
      - Sessions
    get:
      description: Fetch session metadata by ID
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/echo-backend_internal_models.Session'
        "400":
          description: Missing session ID
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: 'Forbidden: ownership mismatch'
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Session not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get session details
      tags:
      - Sessions
  /api/v1/sessions/{id}/messages:
    get:
      description: Retrieve message history for a specific chat session
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of messages
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Missing session ID
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: 'Forbidden: ownership mismatch'
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Session not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get session messages
      tags:
      - Sessions
  /api/v1/settings:
    get:
      description: Retrieve current user preference settings
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/echo-backend_internal_models.UserPreferences'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to get settings
          schema:
            additionalProperties:
              type: string
            type: object
      security:
