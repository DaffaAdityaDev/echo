services:
  echo-agent:
    build:
      context: ./agent
    container_name: echo_agent
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - REDIS_URL=redis://echo-redis:6379
      - LLM_MODEL_API_URL=http://host.docker.internal:1234/v1
      - ENABLE_REDIS=true
      - STATE_BACKEND=backend
      - SERVICE_JWT_SECRET=${SERVICE_JWT_SECRET:-change-this-to-a-secure-service-jwt-secret-min32chars}
      - BACKEND_INTERNAL_URL=${BACKEND_INTERNAL_URL:-http://echo-backend:8080}
    depends_on:
      - echo-redis
    restart: unless-stopped

  echo-backend:
    build:
      context: ./backend
      target: runner
    container_name: echo_backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - AGENT_HTTP_URL=http://echo-agent:3001
      - DATABASE_URL=postgresql://user:password@echo-postgres:5432/echo_db?sslmode=disable
      - DB_HOST=echo-postgres
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=echo_db
      - REDIS_ADDR=echo-redis:6379
      - INTERNAL_AUTH_TOKEN=default-internal-token-secret
      - SERVICE_JWT_SECRET=${SERVICE_JWT_SECRET:-change-this-to-a-secure-service-jwt-secret-min32chars}
      - ENABLE_OTEL=false
    depends_on:
      - echo-postgres
      - echo-agent
    restart: unless-stopped

  echo-frontend:
    build:
      context: ./frontend/web
    container_name: echo_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - echo-backend
    restart: unless-stopped

