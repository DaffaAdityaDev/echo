version: '3.8'

services:
  agent:
    build:
      context: ./agent
    container_name: echo_agent
    command: ["bun", "run", "dev"]
    ports:
      - "3001:3001"
    volumes:
      - ./agent:/app
      - /app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PORT=3001
      - REDIS_URL=redis://redis:6379
      - LLM_MODEL_API_URL=http://host.docker.internal:1234/v1
      - OTEL_COLLECTOR_ADDR=otel-collector:4317
      - ENABLE_REDIS=true
      - STATE_BACKEND=redis
    depends_on:
      - redis
    restart: unless-stopped

  backend:
    image: golang:alpine
    container_name: echo_backend
    volumes:
      - ./backend:/app
    working_dir: /app
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - AGENT_HTTP_URL=http://agent:3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=echo_db
      - REDIS_ADDR=redis:6379
      - INTERNAL_AUTH_TOKEN=default-internal-token-secret
      - ENABLE_OTEL=false
    command: go run cmd/server/main.go
    depends_on:
      - postgres
      - agent
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/web
    container_name: echo_frontend
    command: ["bun", "run", "dev"]
    ports:
      - "3002:3002"
    volumes:
      - ./frontend/web:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - backend
    restart: unless-stopped
