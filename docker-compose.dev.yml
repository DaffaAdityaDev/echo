services:
  echo-postgres:
    image: ankane/pgvector:latest
    container_name: echo_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-echo_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql
      - ./backend/scripts/init-nuq.sql:/docker-entrypoint-initdb.d/init-nuq.sql
    ports:
      - "${DB_PORT:-5432}:5432"
    restart: unless-stopped
    networks:
      - dokploy-network

  echo-redis:
    image: redis:7-alpine
    container_name: echo_redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - dokploy-network

  echo-migrate:
    build:
      context: ./backend
      target: builder
    container_name: echo_backend_migrate
    command: ["./migrate"]
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://user:password@echo-postgres:5432/echo_db?sslmode=disable}
      - DB_HOST=${DB_HOST:-echo-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-user}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_NAME=${DB_NAME:-echo_db}
    depends_on:
      - echo-postgres
    restart: on-failure
    networks:
      - dokploy-network

  echo-seed:
    build:
      context: ./backend
      target: builder
    container_name: echo_backend_seed
    command: ["./seed"]
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://user:password@echo-postgres:5432/echo_db?sslmode=disable}
      - DB_HOST=${DB_HOST:-echo-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-user}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_NAME=${DB_NAME:-echo_db}
    depends_on:
      - echo-migrate
    restart: on-failure
    networks:
      - dokploy-network

volumes:
  postgres_data:
  redis_data:

networks:
  dokploy-network:
    external: true
