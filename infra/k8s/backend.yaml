apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-backend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo-backend
  template:
    metadata:
      labels:
        app: echo-backend
    spec:
      containers:
      - name: backend
        image: echo-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        env:
        - name: PORT
          value: "8080"
        - name: AGENT_HTTP_URL
          value: "http://echo-agent:3001"
        - name: DB_HOST
          value: "echo-postgres"
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          value: "user"
        - name: DB_PASSWORD
          value: "password"
        - name: DB_NAME
          value: "echo_db"
        - name: OTEL_COLLECTOR_ADDR
          value: "echo-otel-collector:4317"
        - name: ENABLE_OTEL
          value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: echo-backend
  namespace: default
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: echo-backend
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: echo-backend-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: echo-backend
  minReplicas: 1
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
