apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-frontend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo-frontend
  template:
    metadata:
      labels:
        app: echo-frontend
    spec:
      containers:
      - name: frontend
        image: echo-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://echo-backend:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: echo-frontend
  namespace: default
spec:
  ports:
  - port: 3000
    targetPort: 3000
  selector:
    app: echo-frontend
