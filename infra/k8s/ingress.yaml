apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: echo-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: kong
    konghq.com/strip-path: "false" # Keep prefix paths intact if required by your router
spec:
  rules:
  - host: echo.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: echo-backend
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: echo-frontend
            port:
              number: 3000
