apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chroma-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-chroma
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo-chroma
  template:
    metadata:
      labels:
        app: echo-chroma
    spec:
      containers:
      - name: chroma
        image: chromadb/chroma:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        volumeMounts:
        - name: chroma-storage
          mountPath: /chroma/chroma
      volumes:
      - name: chroma-storage
        persistentVolumeClaim:
          claimName: chroma-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: echo-chroma
  namespace: default
spec:
  ports:
  - port: 8000
    targetPort: 8000
  selector:
    app: echo-chroma
