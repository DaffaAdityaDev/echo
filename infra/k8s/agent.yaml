apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-agent
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo-agent
  template:
    metadata:
      labels:
        app: echo-agent
    spec:
      containers:
      - name: agent
        image: echo-agent:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        - name: REDIS_URL
          value: "redis://echo-redis:6379"
        - name: LLM_MODEL_API_URL
          value: "http://localhost:1234/v1"
        - name: OTEL_COLLECTOR_ADDR
          value: "echo-otel-collector:4317"
        - name: ENABLE_REDIS
          value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: echo-agent
  namespace: default
spec:
  ports:
  - port: 3001
    targetPort: 3001
  selector:
    app: echo-agent
