name: echo

services:
  # --- DATABASES & INFRASTRUCTURE ---
  echo-postgres:
    image: ankane/pgvector:latest
    container_name: echo_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-echo_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql
      - ./backend/scripts/init-nuq.sql:/docker-entrypoint-initdb.d/init-nuq.sql
    restart: unless-stopped
    networks:
      - dokploy-network

  echo-redis:
    image: redis:7-alpine
    container_name: echo_redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - dokploy-network

  # --- AUTOMATED DATABASE MIGRATION & SEEDING ---
  echo-migrate:
    build:
      context: ./backend
      target: builder
    container_name: echo_backend_migrate
    command: ["./migrate"]
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://user:password@echo-postgres:5432/echo_db?sslmode=disable}
      - DB_HOST=${DB_HOST:-echo-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-user}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_NAME=${DB_NAME:-echo_db}
    depends_on:
      - echo-postgres
    restart: on-failure
    networks:
      - dokploy-network

  echo-seed:
    build:
      context: ./backend
      target: builder
    container_name: echo_backend_seed
    command: ["./seed"]
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://user:password@echo-postgres:5432/echo_db?sslmode=disable}
      - DB_HOST=${DB_HOST:-echo-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-user}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_NAME=${DB_NAME:-echo_db}
    depends_on:
      - echo-migrate
    restart: on-failure
    networks:
      - dokploy-network

  # --- CORE APPLICATION SERVICES ---
  echo-agent:
    build:
      context: ./agent
    container_name: echo_agent
    environment:
      - PORT=${AGENT_PORT:-3001}
      - REDIS_URL=${REDIS_URL:-redis://echo-redis:6379}
      - LLM_MODEL_API_URL=${LLM_MODEL_API_URL:-http://host.docker.internal:1234/v1}
      - ENABLE_REDIS=${ENABLE_REDIS:-true}
      - STATE_BACKEND=${STATE_BACKEND:-backend}
      - INTERNAL_AUTH_TOKEN=${INTERNAL_AUTH_TOKEN:-default-internal-token-secret}
      - SERVICE_JWT_SECRET=${SERVICE_JWT_SECRET:-change-this-to-a-secure-service-jwt-secret-min32chars}
      - BACKEND_URL=${BACKEND_URL:-http://echo-backend:8080}
      - CHROMA_URL=${CHROMA_URL:-http://localhost:8000}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-pk-lf-dummy}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-sk-lf-dummy}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL:-http://localhost:3000}
    depends_on:
      - echo-redis
    restart: on-failure
    networks:
      - dokploy-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

  echo-backend:
    build:
      context: ./backend
      target: runner
    container_name: echo_backend
    environment:
      - PORT=${BACKEND_PORT:-8080}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - AGENT_HTTP_URL=${AGENT_HTTP_URL:-http://echo-agent:3001}
      - DATABASE_URL=${DATABASE_URL:-postgresql://user:password@echo-postgres:5432/echo_db?sslmode=disable}
      - DB_HOST=${DB_HOST:-echo-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-user}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_NAME=${DB_NAME:-echo_db}
      - REDIS_ADDR=${REDIS_ADDR:-echo-redis:6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:-replace-this-with-a-secure-secret}
      - SERVICE_JWT_SECRET=${SERVICE_JWT_SECRET:-change-this-to-a-secure-service-jwt-secret-min32chars}
      - CORS_ORIGIN=${CORS_ORIGIN:-${ALLOW_ORIGINS:-http://localhost:3000}}
      - ALLOW_ORIGINS=${ALLOW_ORIGINS:-http://localhost:3000}
      - INTERNAL_AUTH_TOKEN=${INTERNAL_AUTH_TOKEN:-default-internal-token-secret}
      - ENABLE_OTEL=false
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENCODE_GO_API_KEY=${OPENCODE_GO_API_KEY:-}
      - LM_STUDIO_BASE_URL=${LM_STUDIO_BASE_URL:-}
      - LM_STUDIO_API_KEY=${LM_STUDIO_API_KEY:-}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-gpt-4o}
    depends_on:
      - echo-postgres
      - echo-redis
      - echo-agent
      - echo-migrate
    restart: on-failure
    networks:
      - dokploy-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

  echo-frontend:
    build:
      context: ./frontend/web
      target: runner
      args:
        - BACKEND_URL=http://echo-backend:8080
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: echo_frontend
    environment:
      - PORT=${FRONTEND_PORT:-3000}
      - HOSTNAME=0.0.0.0
      - NODE_ENV=production
      - BACKEND_URL=http://echo-backend:8080
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    depends_on:
      - echo-backend
    restart: on-failure
    networks:
      - dokploy-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

