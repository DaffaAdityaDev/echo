services:
  postgres:
    image: ankane/pgvector:latest
    container_name: echo_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: echo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql
      - ./backend/scripts/init-nuq.sql:/docker-entrypoint-initdb.d/init-nuq.sql
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:latest
    container_name: echo_chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: echo_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-alpine
    container_name: echo_rabbitmq
    ports:
      - "5672:5672"
    restart: unless-stopped


  # Observability Infrastructure
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: echo_otel_collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: echo_jaeger
    ports:
      - "16686:16686" # UI
      - "4317"        # OTLP gRPC receiver (internal)
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: echo_prometheus
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: echo_grafana
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3100:3000" # Access UI at http://localhost:3100
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data:
